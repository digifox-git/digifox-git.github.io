<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>digifox.space</title>
    <link rel="stylesheet" href="mypicks.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="/neo/sidebar.css">
    <link rel="icon" type="image/x-icon" href="/assets/favicons/fav3.ico">
    <script src="/neo/sidebar.js"></script>
    <script src="mypicks.js" type="module"></script>
    <meta name="pagename" content="Cool Pages">
</head>
<body>

    <div id="sidebar"></div>

    <div id="main">
        <div id="grid">
            <div class="panel" style="grid-column: 22 / 32; grid-row: 2 / 32;">
                <p class="panel-title">Friends</p>
                <hr>
                <div id="friends-list"></div> <!-- Built dynamically inside mypicks.js -->
            </div>
            <div class="panel" style="grid-column: 2 / 21; grid-row: 2 / 32;">
                <p class="panel-title">My Picks</p>
                <hr>
                <div id="picks-list">
                </div>
            </div>
        </div>
    </div>

</body>
</html>
