<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>digifox.space</title>
    <link rel="stylesheet" href="/neo/settings/settings.css">
    <link rel="stylesheet" href="/neo/style.css">
    <link rel="stylesheet" href="/neo/sidebar.css">
    <link rel="icon" type="image/x-icon" href="assets/favicons/favicon_glass.ico">
    <script src="/neo/main.js"></script>
    <script src="settings.js"></script>
    <script src="/neo/sidebar.js"></script>
    <script src="profileupload.js"></script>
    <script src="profilehelp.js"></script>
    <meta name="pagename" content="You">
</head>
<body>

    <div id="sidebar"></div>
    
    <div id="main">

        <div class="settings-panel user-title">
            <img id="profilepicture" class="profilepicture earthborderuser" src="/assets/images/profile_empty.png">
            <h1 id="displayname">You</h1>
        </div>
        <div class="settings-panel user-info">
            <div id="settingscontent" hidden>
            <h2>Name</h2>
            <div id="setname">
                <input type="text" id="settingentername" maxlength="22" placeholder="Enter your preferred name">
                <button onclick="set_name()">Set</button>
            </div>
            <h2>Preferences</h2>
            <label>Hide Epilepsy Warnings:</label>
            <input role="checkbox" type="checkbox" id="settingepilepsy">
            <label for="settingepilepsy"></label>
            <p id="settingsearchbackground">Search Background: ...</p>
            <h2>Inventory</h2>
            <div id="inventorylist"></div>
            <h2>Other</h2>
            <p id="settingfunvalue">Fun Value: ...</p>
            <p><br></p>
            <p><a id="resetprofile" href="/settings/reset">RESET</a></p>
        </div>

        <div id="profileinfo">
            <img id="profilehelp" class="profileedit" src="/assets/images/profile_help.png">
            <img id="profileedit" class="profileedit" src="/assets/images/profile_edit.png">
        </div>

    </div>

    <div id="notificationcontainer-help">
        <div id="notificationbg-help"></div>
        <div id="notification-help">
            <h1 id="notifheader-help">Unnamed Header</h1>
            <div class="hspacer"></div>
            <p id="notifmessage-help">Some kind of paragraph.</p>
            <div class="optionbar">
                <button class="notifbutton" onclick="hide_help()">Got it!</button>
            </div>
        </div>
    </div>

    <div id="notificationcontainer">
        <div id="notificationbg"></div>
        <div id="notification">
            <h1 id="notifheader">Unnamed Header</h1>
            <div class="hspacer"></div>
            <p id="notifmessage">Some kind of paragraph.</p>
            <input type="file" id="fileupload" accept=".png,.jpg,.jpeg,.gif"/>
            <div id="optionalimg"><img id="displayImageTemp" class="earthborder" src="/assets/images/starstorm_blank.png"></div>
            <div class="optionbar">
                <button id="uploadpicture" class="notifbutton" onclick="handle_upload()">Upload</button>
                <button class="notifbutton" onclick="hide_message()">Nevermind</button>
            </div>
        </div>
    </div>

</body>
</html>
