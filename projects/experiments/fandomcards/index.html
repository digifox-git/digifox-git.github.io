<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fandom TCG</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="main.js"></script>
</head>
<body>
    <div class="main">
        <h1>This is a button</h1>
        <button id="cardbutton">Press me to get a RANDOM CARD!</button>

        <div class="card">
            <div class="cardcontent">
                <img referrerpolicy="no-referrer" id=cardimage>
                <div id="fadecover"></div>
                <div class="cardname">
                    <p style="margin: 0.5%" id="cardtitle">Lorem Ipsum</p>
                </div>
            </div>
        </div>

        <div id="loadingcard">
            <div id="loadingcardcontent">
                <img src="hotdog.gif" class="cardloading">
            </div>
        </div>
    </div>
</body>
</html>
